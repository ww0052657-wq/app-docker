databaseChangeLog:
  - changeSet:
      id: 001-create-feed-batch
      author: fx-orchestrator
      comment: One row per batch pushed, updated in place when the ACK settles it.
      changes:
        - createTable:
            tableName: feed_batch
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: batch_no
                  type: BIGINT
                  constraints: { nullable: false, unique: true }
              - column:
                  name: rate_count
                  type: INT
                  constraints: { nullable: false }
              - column:
                  name: sent_at
                  type: DATETIME(3)
                  constraints: { nullable: false }
              # PENDING → ACCEPTED | DECLINED | NO_ACK | UNREACHABLE | HTTP_404 | ERROR
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints: { nullable: false }
              - column:
                  name: latency_ms
                  type: INT
              - column:
                  name: settled_at
                  type: DATETIME(3)
      rollback:
        - dropTable:
            tableName: feed_batch
