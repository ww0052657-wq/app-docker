spring.application.name=fx-orchestrator
server.port=8080

# --- the orchestrator's OWN database -----------------------------------------------
# A second service with a second schema. It never touches fxdb, and fx-app-spring never
# touches this one. Overridden by env vars in compose.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/orchestratordb}
spring.datasource.username=${DB_USERNAME:appuser}
spring.datasource.password=${DB_PASSWORD:apppass}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# --- the contract -------------------------------------------------------------------
# Where to PUSH rate batches. In compose this is the service name of YOUR app.
fx.target.url=${FX_TARGET_URL:http://localhost:8080}
# Where YOU should call back. Printed in the logs so the address is never a guess.
fx.self.url=${FX_SELF_URL:http://localhost:8081}

# The cadences the whole exercise turns on.
fx.delay.accepted=2s
fx.delay.declined=10s
fx.delay.unreachable=5s
fx.ack.timeout=5s

# --- logging ------------------------------------------------------------------------
# Clean, wide lines: the feed narrative is the point, so drop the usual Spring furniture.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %msg%n
logging.level.root=WARN
logging.level.FEED=INFO
logging.level.com.fx.orchestrator=INFO
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.liquibase=WARN

server.error.include-message=never
server.error.include-stacktrace=never
